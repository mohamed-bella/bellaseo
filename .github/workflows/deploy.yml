name: Deploy to Hetzner Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 77.42.43.52
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_PASSPHRASE }}
          script: |
            cd /root/bellaseo
            # Pull latest changes from git
            git fetch --all
            git reset --hard origin/main
            
            # Install & Build Unified Monolith
            cd frontend
            npm install
            npm run build
            
            # Restart PM2 with the unified monolith script
            # Assumes your ecosystem.config.js is updated or you are starting directly
            pm2 restart openseo-unified || pm2 start src/server/server.js --name "openseo-unified"
            pm2 save
